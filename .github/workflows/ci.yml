name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-lint:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/**/*.md
            README.md
        continue-on-error: true

  requirements-check:
    name: Requirements CSV sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate requirements.csv
        run: python scripts/check_requirements.py docs/M1/requirements/requirements.csv

  python-tests:
    name: Python reference simulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unittest
        run: python -m unittest discover -s tests/python -t . -v
      - name: Smoke scenario
        run: python scripts/run_smoke.py
      - name: Determinism regression
        run: python scripts/check_determinism.py
      - name: M4 verification orchestrator
        run: python scripts/run_verification.py

  build:
    name: CMake hello build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure || true
